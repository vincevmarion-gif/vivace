<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Primary SEO -->
    <title>Vivace Limoncello — Doe anders, geniet anders.</title>
    <meta
      name="description"
      content="Vivace is een premium Italiaanse limoncello, geproduceerd in Nederland. Voor elke verkochte fles doneren we €1 aan geselecteerde impactprojecten. Te koop bij geselecteerde supermarkten."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://drinkvivace.nl/" />
    <!-- Open Graph / social share previews (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://drinkvivace.nl/" />
    <meta property="og:site_name" content="Vivace" />
    <meta property="og:title" content="Vivace Limoncello — Doe anders, geniet anders." />
    <meta
      property="og:description"
      content="Premium Italiaanse limoncello, gemaakt in Nederland. €1 per fles naar geselecteerde impactprojecten."
    />
    <meta property="og:image" content="https://drinkvivace.nl/images/vivace-og-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="nl_NL" />
    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vivace Limoncello — Doe anders, geniet anders." />
    <meta
      name="twitter:description"
      content="Premium Italiaanse limoncello, gemaakt in Nederland. €1 per fles naar geselecteerde impactprojecten."
    />
    <meta name="twitter:image" content="https://drinkvivace.nl/images/vivace-og-share.jpg" />
    <!-- Fonts: preconnect belongs here in <head>, not inside the React tree -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Leaflet (map for Verkooppunten page): CDN only, no API key or npm
         install needed. Loaded as a blocking script so window.L is ready
         before the app renders. -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
